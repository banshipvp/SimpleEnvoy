name: SimpleEnvoy
version: '1.0'
main: local.simpleenvoy.SimpleEnvoyPlugin
api-version: '1.20'
description: "Custom envoy chest event plugin for TechnoClash Factions"
authors: [TechnoClash]
softdepend: [SimpleFactions]

commands:
  envoy:
    description: Manage envoy events
    usage: /envoy <start|stopall|setspawn|setdesert|setplains|setnether|info|reload>
    permission: simpleenvoy.manage
    permission-message: "§cYou don't have permission to manage envoys."

  envoys:
    description: Show envoy timer status
    usage: /envoys
    permission: simpleenvoy.view
    permission-message: "§cYou don't have permission."

  envoyedit:
    description: Open loot editor GUI for an envoy tier
    usage: /envoyedit <tier>
    permission: simpleenvoy.manage
    permission-message: "§cYou don't have permission."

  envoyadd:
    description: Add the held item to a tier's loot table
    usage: /envoyadd <tier> <chancePercent>
    permission: simpleenvoy.manage
    permission-message: "§cYou don't have permission."

permissions:
  simpleenvoy.manage:
    description: Admin access to all envoy management commands
    default: op
  simpleenvoy.view:
    description: Can view envoy timers (/envoys)
    default: true
